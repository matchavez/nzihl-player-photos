name: Build player photo warehouse

on:
  # Weekly, Thursday 19:00 UTC = Friday 07:00 NZST (winter) / 08:00 NZDT (summer).
  schedule:
    - cron: "0 19 * * 4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Run unit tests
        run: PYTHONPATH=src python -m pytest tests/ -v

      - name: Scrape rosters + resolve headshots
        run: python -m player_photos --output-dir .

      - name: Commit new/changed photos + manifest + gallery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add photos/ manifest.json index.html
          if git diff --cached --quiet; then
            echo "Nothing changed -- no commit."
            exit 0
          fi
          added=$(git diff --cached --name-status | grep -c '^A' || true)
          modified=$(git diff --cached --name-status | grep -c '^M' || true)
          git commit -m "Weekly photo warehouse update (+${added} / ~${modified} files)"
          git push
